name: Build Port Doctor APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2
    
    - name: Make gradlew executable
      run: |
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew
    
    - name: Build APK
      run: ./gradlew assembleRelease
    
    - name: Locate APK
      run: |
        echo "Searching for APK files..."
        find . -name "*.apk" -type f
        echo "---"
        ls -la app/build/outputs/apk/release/ || echo "release folder not found"
        echo "---"
        find app/build -type d
    
    - name: Sign APK
      run: |
        keytool -genkey -v -keystore release.keystore \
          -alias portdoctor -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass password -keypass password \
          -dname "CN=PortDoctor, OU=Dev, O=PortDoctor, L=City, ST=State, C=IN"
        UNSIGNED=$(find app/build -name "*.apk" -not -name "*signed*" -not -name "*.unsigned*" | head -1)
        if [ -z "$UNSIGNED" ]; then
          UNSIGNED=$(find app/build -name "*.apk" | head -1)
        fi
        echo "Found APK: $UNSIGNED"
        $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
          --ks release.keystore \
          --ks-pass pass:password \
          --out app/build/outputs/apk/release/PortDoctor-signed.apk \
          "$UNSIGNED"
    
    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: PortDoctor-APK
        path: app/build/outputs/apk/release/PortDoctor-signed.apk
