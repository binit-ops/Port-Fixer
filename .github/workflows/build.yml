name: Build Port Doctor APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Build APK
      run: chmod +x gradlew && ./gradlew assembleRelease
    
    - name: Sign APK
      run: |
        keytool -genkey -v -keystore release.keystore \
          -alias portdoctor -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass password -keypass password \
          -dname "CN=PortDoctor, OU=Dev, O=PortDoctor, L=City, ST=State, C=IN"
        $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
          --ks release.keystore \
          --ks-pass pass:password \
          --out app/build/outputs/apk/release/PortDoctor-signed.apk \
          app/build/outputs/apk/release/app-release-unsigned.apk
  
    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: PortDoctor-APK
        path: app/build/outputs/apk/release/PortDoctor-signed.apk
